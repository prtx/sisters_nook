{% extends "base.html" %}
{% block content %}
  <h2>Menu</h2>
  <table class="table">
    <thead><tr><th>Item</th><th>Description</th><th>Price</th><th>Active</th></tr></thead>
    <tbody>
      {% for item in menu_items %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.description or "-" }}</td>
          <td>${{ "%.2f"|format(item.current_price) }}</td>
          <td>{{ "Yes" if item.is_active else "No" }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
