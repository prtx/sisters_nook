{% extends "base.html" %}
{% block title %}Edit User | Sisters Nook{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block page_subtitle %}Update user profile and role{% endblock %}
{% block content %}
  <article class="card" style="max-width: 760px;">
    <form method="post">
      <div class="field">
        <label for="first_name">First name</label>
        <input id="first_name" name="first_name" value="{{ user.first_name }}" required>
      </div>
      <div class="field">
        <label for="last_name">Last name</label>
        <input id="last_name" name="last_name" value="{{ user.last_name }}" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="{{ user.email }}" required>
      </div>
      <div class="field">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          {% for role in roles %}
            <option value="{{ role }}" {% if user.role.value == role %}selected{% endif %}>{{ role|capitalize }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="button-row">
        <button class="primary-button" type="submit">Save changes</button>
        <a class="secondary-button" href="{{ url_for('users.list_users') }}">Back</a>
      </div>
    </form>
  </article>
{% endblock %}
