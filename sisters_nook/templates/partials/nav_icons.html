{% macro nav_icon(kind) -%}
<span class="nav-icon" aria-hidden="true">
  {% if kind == 'home' %}
    <svg viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V19a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-8.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
  {% elif kind == 'create_order' %}
    <svg viewBox="0 0 24 24"><path d="M7 4h10l1 3H6l1-3zm-2 5h14v11H5V9zm4 2v7M13 12v7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  {% elif kind == 'order_history' %}
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v4l3 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  {% elif kind == 'menu' %}
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M18 17l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  {% elif kind == 'analysis' %}
    <svg viewBox="0 0 24 24"><path d="M5 18V8h3v10M10 18V5h3v13M15 18v-7h3v7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  {% elif kind == 'users' %}
    <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 9a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  {% elif kind == 'audit' %}
    <svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V7l7-4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 12.5 11 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  {% endif %}
</span>
{%- endmacro %}
